<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
                <defs>
                    <!-- Gradiente Neón Horizontal (Cian a Verde) -->
                    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#00FFFF"></stop>
                        <stop offset="100%" stop-color="#39FF14"></stop>
                    </linearGradient>
                    
                    <!-- Filtro de Resplandor (Glow) Intenso -->
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="12" result="blur"></feGaussianBlur>
                        <feMerge>
                            <feMergeNode in="blur"></feMergeNode>
                            <feMergeNode in="blur"></feMergeNode>
                            <feMergeNode in="SourceGraphic"></feMergeNode>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Fondo Matte Black -->
                <rect width="512" height="512" fill="#000000" rx="110"></rect>

                <!-- Emblema Principal con Efecto Glow -->
                <g filter="url(#glow)">
                    
                    <!-- ========================================== -->
                    <!-- CAPA 0: RAMIFICACIONES (Tramos delgados)   -->
                    <!-- ========================================== -->
                    <g stroke="url(#neonGrad)" stroke-width="12" stroke-linecap="round" fill="none">
                        <!-- Grupo Superior (5 Nodos) -->
                        <path d="M 140 140 L 60 60"></path>   <!-- Diagonal Extrema Izq -->
                        <path d="M 190 140 L 110 60"></path>  <!-- Diagonal Media Izq -->
                        <path d="M 256 206 L 256 60"></path>  <!-- Vertical Central -->
                        <path d="M 322 140 L 402 60"></path>  <!-- Diagonal Media Der -->
                        <path d="M 372 140 L 452 60"></path>  <!-- Diagonal Extrema Der -->

                        <!-- Grupo Inferior (5 Nodos) -->
                        <path d="M 140 372 L 60 452"></path>   <!-- Diagonal Extrema Izq -->
                        <path d="M 190 372 L 110 452"></path>  <!-- Diagonal Media Izq -->
                        <path d="M 256 306 L 256 452"></path>  <!-- Vertical Central -->
                        <path d="M 322 372 L 402 452"></path>  <!-- Diagonal Media Der -->
                        <path d="M 372 372 L 452 452"></path>  <!-- Diagonal Extrema Der -->

                        <!-- Nodos Laterales (1 por lado) -->
                        <path d="M 140 256 L 60 256"></path>   <!-- Horizontal Izq -->
                        <path d="M 372 256 L 452 256"></path>  <!-- Horizontal Der -->
                    </g>

                    <!-- ========================================== -->
                    <!-- CAPA 1: CINTAS INFERIORES (Pasan por debajo)-->
                    <!-- ========================================== -->
                    <g stroke="url(#neonGrad)" stroke-width="18" stroke-linecap="round" fill="none">
                        <!-- Diagonales TR a BL -->
                        <path d="M 322 140 L 140 322"></path> <!-- Superior -->
                        <path d="M 372 190 L 190 372"></path> <!-- Inferior -->
                    </g>

                    <!-- ========================================== -->
                    <!-- CAPA 2: CORTES 3D (Máscara Negra)          -->
                    <!-- ========================================== -->
                    <!-- Estos segmentos negros borran las cintas inferiores justo donde cruzan las superiores -->
                    <g stroke="#000000" stroke-width="34" stroke-linecap="butt" fill="none">
                        <path d="M 226 176 L 286 236"></path> <!-- Corte intersección superior -->
                        <path d="M 226 276 L 286 336"></path> <!-- Corte intersección inferior -->
                    </g>

                    <!-- ========================================== -->
                    <!-- CAPA 3: CINTAS SUPERIORES (Pasan por arriba)-->
                    <!-- ========================================== -->
                    <g stroke="url(#neonGrad)" stroke-width="18" fill="none">
                        
                        <!-- Marcos Laterales (Corchetes con esquinas afiladas) -->
                        <path d="M 190 140 L 140 140 L 140 372 L 190 372" stroke-linejoin="miter" stroke-miterlimit="4"></path>
                        <path d="M 322 140 L 372 140 L 372 372 L 322 372" stroke-linejoin="miter" stroke-miterlimit="4"></path>

                        <!-- Diagonales TL a BR (Pasan por encima de los cortes) -->
                        <path d="M 190 140 L 372 322" stroke-linecap="round"></path>
                        <path d="M 140 190 L 322 372" stroke-linecap="round"></path>
                    </g>

                    <!-- ========================================== -->
                    <!-- CAPA 4: LOS 12 NODOS (Círculos)            -->
                    <!-- ========================================== -->
                    <g stroke="url(#neonGrad)" stroke-width="12" fill="#000000">
                        <!-- Top -->
                        <circle cx="60" cy="60" r="14"></circle>
                        <circle cx="110" cy="60" r="14"></circle>
                        <circle cx="256" cy="60" r="14"></circle>
                        <circle cx="402" cy="60" r="14"></circle>
                        <circle cx="452" cy="60" r="14"></circle>
                        <!-- Bottom -->
                        <circle cx="60" cy="452" r="14"></circle>
                        <circle cx="110" cy="452" r="14"></circle>
                        <circle cx="256" cy="452" r="14"></circle>
                        <circle cx="402" cy="452" r="14"></circle>
                        <circle cx="452" cy="452" r="14"></circle>
                        <!-- Sides -->
                        <circle cx="60" cy="256" r="14"></circle>
                        <circle cx="452" cy="256" r="14"></circle>
                    </g>
                </g>
            </svg>